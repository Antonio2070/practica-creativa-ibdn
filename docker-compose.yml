services:

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: practica_cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/9042' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s
    networks:
      - practica_net
    restart: unless-stopped

  cassandra-init:
    image: python:3.10-slim
    container_name: cassandra-init
    depends_on:
      - cassandra
    volumes:
      - .:/app
    working_dir: /app
    networks:
      - practica_net
    command: >
      sh -c "
      pip install cassandra-driver;
      echo 'Esperando a Cassandra e importando distancias...';
      until python resources/import_distances_cassandra.py; do
        echo 'Cassandra todavía no está lista. Reintentando...';
        sleep 5;
      done;
      touch /app/.cassandra_ready;
      echo 'Cassandra inicializada correctamente.';
      "
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - practica_net
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:4.2.0
    container_name: kafka-init
    depends_on:
      - kafka
    networks:
      - practica_net
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      echo 'Esperando a Kafka...';
      until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list; do
        sleep 2;
      done;

      echo 'Creando topic flight-delay-ml-request...';
      /opt/kafka/bin/kafka-topics.sh
      --bootstrap-server kafka:29092
      --create
      --if-not-exists
      --topic flight-delay-ml-request
      --partitions 1
      --replication-factor 1;

      echo 'Creando topic flight-delay-ml-response...';
      /opt/kafka/bin/kafka-topics.sh
      --bootstrap-server kafka:29092
      --create
      --if-not-exists
      --topic flight-delay-ml-response
      --partitions 1
      --replication-factor 1;

      echo 'Topics creados correctamente.';
      "

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --allowed-hosts "*"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - practica_net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - practica_net
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    networks:
      - practica_net
    entrypoint: >
      /bin/sh -c "
      echo 'Esperando a MinIO...';
      until mc alias set local http://minio:9000 admin password123; do
        sleep 2;
      done;
      echo 'Creando bucket warehouse...';
      mc mb -p local/warehouse || true;
      echo 'Bucket warehouse listo.';
      "

  lakehouse-init:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: lakehouse-init
    depends_on:
      - minio-init
    volumes:
      - .:/app
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password123
      AWS_REGION: us-east-1
    networks:
      - practica_net
    command: >
      sh -c "
      echo 'Inicializando Lakehouse con Iceberg...';
      rm -f /app/.iceberg_ready;
      spark-submit --packages org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.1,org.apache.hadoop:hadoop-aws:3.4.2 /app/resources/import_training_data_iceberg.py;
      RESULT=$$?;
      if [ $$RESULT -eq 0 ]; then
        touch /app/.iceberg_ready;
        echo 'Lakehouse inicializado correctamente.';
      else
        echo 'ERROR: la importación a Iceberg ha fallado.';
        exit $$RESULT;
      fi;
      "

  model-training:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: model-training
    depends_on:
      - lakehouse-init
      - mlflow
    volumes:
      - .:/app
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password123
      AWS_REGION: us-east-1
      MLFLOW_TRACKING_URI: http://mlflow:5000
    networks:
      - practica_net
    command: >
      sh -c "
      echo 'Entrenando modelo desde Lakehouse...';
      if [ -f /app/.models_lakehouse_ready ]; then
        echo 'Modelos ya entrenados en Lakehouse. Saltando entrenamiento.';
      else
        spark-submit --driver-memory 4g --conf spark.driver.extraJavaOptions=-Djava.net.preferIPv4Stack=true --packages org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.1,org.apache.hadoop:hadoop-aws:3.4.2 /app/resources/train_spark_mllib_model_lakehouse.py;
        RESULT=$$?;
        if [ $$RESULT -eq 0 ]; then
          touch /app/.models_lakehouse_ready;
          echo 'Entrenamiento terminado correctamente.';
        else
          echo 'ERROR: el entrenamiento ha fallado.';
          exit $$RESULT;
        fi;
      fi
      "
    profiles:
      - manual

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-master
    ports:
      - "7077:7077"
      - "8081:8081"
    volumes:
      - .:/app
    command: >
      sh -c "
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master
      --port 7077
      --webui-port 8081
      "
    networks:
      - practica_net
    restart: unless-stopped

  spark-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-worker-1
    depends_on:
      - spark-master
    volumes:
      - .:/app
    command: >
      sh -c "
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --cores 2
      --memory 2g
      --webui-port 8082
      "
    networks:
      - practica_net
    restart: unless-stopped

  spark-worker-2:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-worker-2
    depends_on:
      - spark-master
    volumes:
      - .:/app
    command: >
      sh -c "
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --cores 2
      --memory 2g
      --webui-port 8083
      "
    networks:
      - practica_net
    restart: unless-stopped

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow    
    container_name: airflow
    depends_on:
      - lakehouse-init
      - mlflow
    ports:
      - "8080:8080"
    environment:
      AIRFLOW_HOME: /opt/airflow
      PROJECT_HOME: /app
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "practica_creativa_secret"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - .:/app
      - ./resources/airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "
      airflow db migrate;
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || true;
      airflow dags reserialize;
      airflow webserver --port 8080 --daemon;

      echo 'Esperando a que Airflow registre el DAG...';
      for i in $$(seq 1 60); do
        if airflow dags list | grep -q agile_data_science_batch_prediction_model_training; then
          echo 'DAG registrado correctamente.';
          break;
        fi;
        echo 'Esperando DAG... $$i/60';
        sleep 5;
      done;

      airflow dags unpause agile_data_science_batch_prediction_model_training || true;

      if [ ! -f /app/.models_lakehouse_ready ]; then
        airflow dags trigger agile_data_science_batch_prediction_model_training || true;
      fi;

      airflow scheduler
      "
    networks:
      - practica_net
    restart: unless-stopped

  spark-predictor:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-predictor
    depends_on:
      - kafka-init
      - cassandra-init
      - airflow
      - spark-master
      - spark-worker-1
      - spark-worker-2
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password123
      AWS_REGION: us-east-1
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_DRIVER_HOST: spark-predictor
    volumes:
      - .:/app
    command: >
      sh -c "
      echo 'Esperando a Kafka, Cassandra y modelos Lakehouse...';
      while [ ! -f /app/.cassandra_ready ]; do
        echo 'Esperando a cassandra-init...';
        sleep 5;
      done;
      while [ ! -f /app/.models_lakehouse_ready ]; do
        echo 'Esperando a model lakehouse...';
        sleep 5;
      done;
      sleep 20;
      JAR=$$(find target/scala-2.13 -name '*.jar' | head -n 1);
      echo \"Usando JAR: $$JAR\";
      spark-submit --class es.upm.dit.ging.predictor.MakePrediction --master spark://spark-master:7077 --deploy-mode client --conf spark.driver.host=spark-predictor --conf spark.driver.bindAddress=0.0.0.0 --conf spark.driver.port=4040 --conf spark.blockManager.port=4041 --conf spark.executor.instances=2 --conf spark.executor.cores=1 --conf spark.executor.memory=1g --total-executor-cores 2 --packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.1,com.datastax.spark:spark-cassandra-connector_2.13:3.5.1 $$JAR
      "
    networks:
      - practica_net
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: flask-web
    ports:
      - "5001:5001"
    depends_on:
      - kafka-init
      - cassandra-init
      - airflow
    volumes:
      - .:/app
    command: >
      sh -c "
      echo 'Esperando a Kafka, Cassandra y modelos...';
      while [ ! -f /app/.cassandra_ready ]; do
        echo 'Esperando a cassandra-init...';
        sleep 5;
      done;
      while [ ! -f /app/.models_lakehouse_ready ]; do
        echo 'Esperando a model lakehouse...';
        sleep 5;
      done;
      sleep 10;
      python3 predict_flask.py
      "
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - practica_net
    restart: unless-stopped

volumes:
  cassandra_data:
  minio_data:
  mlflow_data:

networks:
  practica_net:
    driver: bridge