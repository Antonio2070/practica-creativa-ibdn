apiVersion: v1
kind: Service
metadata:
  name: flask-web
  namespace: practica-ibdn
spec:
  type: NodePort
  selector:
    app: flask-web
  ports:
    - name: web
      port: 5001
      targetPort: 5001
      nodePort: 30501
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-web
  namespace: practica-ibdn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-web
  template:
    metadata:
      labels:
        app: flask-web
    spec:
      enableServiceLinks: false
      containers:
        - name: flask-web
          image: practica-web:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: CASSANDRA_HOST
              value: cassandra
          command:
            - sh
            - -c
          args:
            - |
              echo 'Esperando a Kafka y Cassandra...';

              until timeout 3 bash -c '</dev/tcp/kafka/29092' >/dev/null 2>&1; do
                echo 'Esperando a Kafka...';
                sleep 5;
              done;

              until timeout 3 bash -c '</dev/tcp/cassandra/9042' >/dev/null 2>&1; do
                echo 'Esperando a Cassandra...';
                sleep 5;
              done;

              cd /app/resources/web;
              python3 predict_flask.py
          ports:
            - containerPort: 5001
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
