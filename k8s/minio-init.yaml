apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: practica-ibdn
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: minio-init
    spec:
      restartPolicy: OnFailure
      enableServiceLinks: false
      containers:
        - name: minio-init
          image: minio/mc:latest
          command:
            - sh
            - -c
          args:
            - |
              until mc alias set local http://minio:9000 admin password123; do
                echo "Esperando a MinIO..."
                sleep 5
              done

              mc mb -p local/warehouse || true
              mc ls local
