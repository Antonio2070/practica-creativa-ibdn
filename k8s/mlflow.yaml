apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: practica-ibdn
spec:
  selector:
    app: mlflow
  ports:
    - name: web
      port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: practica-ibdn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      enableServiceLinks: false
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:latest
          command:
            - sh
            - -c
          args:
            - |
              mlflow server \
                --host 0.0.0.0 \
                --port 5000 \
                --backend-store-uri sqlite:////mlflow/mlflow.db \
                --default-artifact-root /mlflow/artifacts \
                --allowed-hosts "*"
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
