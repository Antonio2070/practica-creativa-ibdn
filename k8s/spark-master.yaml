apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: practica-ibdn
spec:
  selector:
    app: spark-master
  ports:
    - name: spark
      port: 7077
      targetPort: 7077
    - name: webui
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: practica-ibdn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
    spec:
      enableServiceLinks: false
      containers:
        - name: spark-master
          image: practica-spark:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
          args:
            - |
              /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master \
                --host 0.0.0.0 \
                --port 7077 \
                --webui-port 8081
          ports:
            - containerPort: 7077
            - containerPort: 8081
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"
